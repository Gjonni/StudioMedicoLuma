name: Build and push

on:
  push:
    branches:
      - main
      - "upgrade/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: homelab-dashboard
  IMAGE_REGISTRY: registry.filice.eu
  HARBOR_PROJECT: StudioMedicoLuma

jobs:
  prepare-tags:
    runs-on: ubuntu-latest
    outputs:
      branch_slug: ${{ steps.tags.outputs.branch }}
    steps:
      - id: tags
        run: |
          BRANCH_TAG=$(echo "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9_.-]+#-#g' | sed -E 's/^-+//; s/-+$//')
          if [ -z "$BRANCH_TAG" ]; then BRANCH_TAG="unknown"; fi
          echo "branch=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"

  # Build multi-arch (amd64 Pi-dev/CI + arm64 Raspberry Pi 5) diretta dal
  # Containerfile: buildx gestisce nativamente il manifest multi-piattaforma,
  # non serve lo schema a job separati + merge usato per progetti S2I.
  build-push:
    needs: [prepare-tags]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BRANCH_TAG: ${{ needs.prepare-tags.outputs.branch_slug }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ env.BRANCH_TAG }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Firma Cosign keyless (solo main)
  sign:
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write   # richiesto da Cosign per OIDC keyless
      contents: read
    steps:
      - name: Log in to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign multi-arch manifest (keyless)
        run: |
          IMAGE_REF="${IMAGE_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${GITHUB_SHA}"
          cosign sign --yes "$IMAGE_REF"
